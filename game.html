<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拾遗人格测评 - 山海拾遗</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z0Q468J260"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());

    gtag("config", "G-Z0Q468J260");
  </script>

  <script src="js/analytics.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="page-header">
    <h1>非遗FYBI测评</h1>
    <p>测测你的拾遗人格，找到适合你的非遗方向</p>
    <a href="index.html" class="back-link">返回首页</a>
  </header>
  <main class="game-box shiyi-test-box">
    <section class="question-card shiyi-start-card" id="startScreen">
      <p class="test-kicker">山海拾遗 · 非遗FYBI测评系统</p>
      <h2>测测你是哪种非遗守护人</h2>
      <p class="test-intro">
        本测评基于 E/I、H/C、L/T、M/P 四组维度，
        通过符合程度量表生成你的拾遗人格代码、类型报告与非遗项目推荐。
      </p>

      <div class="mode-grid">
        <button class="mode-card" type="button" data-mode="quick">
          <span class="mode-title">轻测版</span>
          <span class="mode-desc">20题｜约3分钟｜快速了解自己</span>
        </button>

        <button class="mode-card recommended selected" type="button" data-mode="standard">
          <span class="mode-badge">推荐</span>
          <span class="mode-title">标准版</span>
          <span class="mode-desc">50题｜约8分钟｜生成完整报告</span>
        </button>

        <button class="mode-card" type="button" data-mode="deep">
          <span class="mode-title">深测版</span>
          <span class="mode-desc">100题｜约15分钟｜适合深度探索</span>
        </button>
      </div>

      <div class="selected-mode-panel">
        <p id="selectedModeText">已选择：标准版｜50题｜约8分钟｜生成完整报告</p>
        <button class="btn primary red start-test-btn" id="startSelectedMode" type="button">
          开始测评
        </button>
      </div>
    </section>

    <section class="question-card shiyi-question-card hidden" id="questionScreen">
      <div class="progress-wrap">
        <div class="progress-info">
          <span id="modeName">标准版</span>
          <span id="questionProgress">1 / 50</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <p class="scale-tip">请根据你的真实感受选择符合程度。</p>
      <h2 id="questionTitle">题目加载中...</h2>

      <div class="scale-options" id="options"></div>

      <div class="question-actions">
        <button class="btn secondary dark" id="prevBtn" type="button">上一题</button>
        <button class="btn primary red" id="nextBtn" type="button">下一题</button>
      </div>
    </section>

    <section class="question-card shiyi-result-card hidden" id="resultScreen">
      <div id="resultContent"></div>
    </section>
  </main>

  <script src="js/shiyi-questions.js"></script>
  <script src="js/shiyi-profiles.js"></script>
  <script src="js/national-heritage-projects.js"></script>
  <script src="js/shiyi-recommender.js"></script>
  <script src="js/game.js"></script>
</body>
</html>

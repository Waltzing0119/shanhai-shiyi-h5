<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>非遗地图 - 山海拾遗</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z0Q468J260"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());

    gtag("config", "G-Z0Q468J260");
  </script>

  <script src="js/analytics.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="page-header">
    <h1>非遗地图</h1>
    <p>点击地图聚合点或非遗点位，了解对应内容</p>
    <a href="index.html" class="back-link">返回首页</a>
  </header>

  <main>
    <section class="map-box">
      <div class="map-toolbar">
        <button id="zoomIn" type="button">＋</button>
        <button id="zoomOut" type="button">－</button>
        <button id="resetMap" type="button">复位</button>
      </div>

      <div class="map-viewport" id="mapViewport">
        <div class="map-canvas" id="mapCanvas">
          <picture class="map-picture">
            <source srcset="images/map-boluo.webp" type="image/webp" />
            <img
              src="images/map-boluo.jpg"
              alt="博罗非遗地图"
              class="map-image"
              decoding="async"
              fetchpriority="high"
            />
          </picture>
          <div class="map-markers" id="mapMarkers"></div>
        </div>
      </div>

      <p class="map-tip" id="mapTip">当前为县级总览。可点击“＋”或县级聚合点，查看各镇/片区非遗数量。</p>

      <p class="map-data-note">
        注：当前地图展示内容为团队现阶段公开资料收集与整理结果，非最终完整名录。
        如项目信息有误、需要补充，或希望入驻平台，欢迎
        <a href="join.html">联系我们</a>
        共同完善。
      </p>
    </section>

    <section class="list">
      <h2 class="list-title" id="heritageListTitle">全部非遗项目</h2>
      <div id="heritageList"></div>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script>
    const mapCanvas = document.getElementById("mapCanvas");
    const mapViewport = document.getElementById("mapViewport");
    const mapMarkers = document.getElementById("mapMarkers");
    const list = document.getElementById("heritageList");
    const listTitle = document.getElementById("heritageListTitle");
    const mapTip = document.getElementById("mapTip");

    let scale = 1;
    let translateX = 0;
    let translateY = 0;

    let isDragging = false;
    let startX = 0;
    let startY = 0;

    let selectedTownName = "";

    const countyCluster = {
      name: "博罗县",
      locationTop: "50%",
      locationLeft: "50%"
    };

    const townScale = 1.2;

    const levelOrder = {
      "国家级": 1,
      "省级": 2,
      "市级": 3,
      "区级": 4,
      "县级": 4,
      "待补充": 99
    };

    function getCurrentLayer() {
      if (scale < townScale) {
        return "county";
      }

      return "town";
    }

    function getSortedHeritageList(items) {
      return [...items].sort((a, b) => {
        const levelA = levelOrder[a.heritageLevel] || 99;
        const levelB = levelOrder[b.heritageLevel] || 99;

        if (levelA !== levelB) {
          return levelA - levelB;
        }

        return (b.popularity || 0) - (a.popularity || 0);
      });
    }

    function getTownItems(townName) {
      return heritageList.filter(item => item.town === townName);
    }

    function getTownCount(townName) {
      return getTownItems(townName).length;
    }

    function clearMarkers() {
      mapMarkers.innerHTML = "";
    }

    function getMarkerInverseScale() {
      return 1 / scale;
    }

    function updateMarkerSize() {
      const markers = document.querySelectorAll(".map-marker");
      const inverseScale = getMarkerInverseScale();

      markers.forEach(marker => {
        marker.style.transform = `translate(-50%, -50%) scale(${inverseScale})`;
      });
    }

    function createMarker({ text, top, left, className, onClick }) {
      const marker = document.createElement("button");

      marker.type = "button";
      marker.className = className;
      marker.style.top = top;
      marker.style.left = left;
      marker.innerText = text;
      marker.style.transform = `translate(-50%, -50%) scale(${getMarkerInverseScale()})`;

      if (onClick) {
        marker.onclick = onClick;
      }

      mapMarkers.appendChild(marker);
    }

    function renderCountyLayer() {
      clearMarkers();
      selectedTownName = "";

      createMarker({
        text: `${countyCluster.name} · 共 ${heritageList.length} 项非遗`,
        top: countyCluster.locationTop,
        left: countyCluster.locationLeft,
        className: "map-marker county-marker",
        onClick: () => {
          trackShiyiEvent("click_county_cluster", {
            cluster_name: countyCluster.name,
            heritage_count: heritageList.length
          });

          scale = townScale;
          translateX = 0;
          translateY = 0;
          updateMapTransform();
          renderMapLayer();
        }
      });

      mapTip.innerText = "当前为县级总览。可点击“＋”或县级聚合点，查看各镇/片区非遗数量。";
    }

    function renderTownLayer() {
      clearMarkers();

      townClusters.forEach(town => {
        const count = getTownCount(town.name);

        if (count === 0) return;

        const isSelected = selectedTownName === town.name;

        createMarker({
          text: `${town.name} · ${count} 项`,
          top: town.locationTop,
          left: town.locationLeft,
          className: `map-marker town-marker${isSelected ? " selected-town-marker" : ""}`,
          onClick: () => {
            trackShiyiEvent("click_town_marker", {
              town_name: town.name,
              heritage_count: count
            });
          
            selectedTownName = town.name;
            renderMapLayer();
          }
        });
      });

      if (selectedTownName) {
        mapTip.innerText = `当前为镇级总览。已选择“${selectedTownName}”，下方显示该区域非遗项目。`;
      } else {
        mapTip.innerText = "当前为镇级总览。点击某个镇/片区标签，下方即可查看该区域非遗项目；未选择时默认显示全部项目。";
      }
    }

    function renderMapLayer() {
      const layer = getCurrentLayer();

      if (layer === "county") {
        renderCountyLayer();
      } else {
        renderTownLayer();
      }

      updateMarkerSize();
      renderHeritageList();
    }

    function renderHeritageList() {
      const layer = getCurrentLayer();
      let items = [];
      let titleText = "";

      if (layer === "county") {
        items = getSortedHeritageList(heritageList);
        titleText = `当前已收集非遗项目（共 ${items.length} 项）`;
      } else if (selectedTownName) {
        items = getSortedHeritageList(getTownItems(selectedTownName));
        titleText = `${selectedTownName}非遗项目（共 ${items.length} 项）`;
      } else {
        items = getSortedHeritageList(heritageList);
        titleText = `镇级总览：当前已收集非遗项目（共 ${items.length} 项）`;
      }

      listTitle.innerText = titleText;
      list.innerHTML = "";

      if (items.length === 0) {
        list.innerHTML = `
          <div class="item empty-item">
            <h3>暂无项目</h3>
            <p>该区域暂未收录非遗项目。</p>
          </div>
        `;
        return;
      }

      items.forEach((item, index) => {
        const card = document.createElement("a");
        card.className = "item numbered-heritage-card";
        card.href = `detail.html?id=${item.id}`;

        const levelText = item.heritageLevel || "待补充";

        card.innerHTML = `
          <div class="heritage-number">${index + 1}</div>
          <div class="heritage-card-content">
            <h3>${item.name}</h3>
            <p><strong>级别：</strong>${levelText}</p>
            <p><strong>类别：</strong>${item.category}</p>
            <p><strong>地区：</strong>${item.area}</p>
            <p>${item.intro}</p>
          </div>
        `;

        list.appendChild(card);
      });
    }

    function updateMapTransform() {
      mapCanvas.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scale})`;
      updateMarkerSize();
    }

    function zoomMap(delta) {
      const oldLayer = getCurrentLayer();

      scale = Math.min(1.9, Math.max(1, scale + delta));

      if (scale === 1) {
        translateX = 0;
        translateY = 0;
        selectedTownName = "";
      }

      const newLayer = getCurrentLayer();

      if (oldLayer !== newLayer) {
        selectedTownName = "";
      }

      updateMapTransform();
      renderMapLayer();
    }

    document.getElementById("zoomIn").onclick = () => zoomMap(0.2);
    document.getElementById("zoomOut").onclick = () => zoomMap(-0.2);

    document.getElementById("resetMap").onclick = () => {
      scale = 1;
      translateX = 0;
      translateY = 0;
      selectedTownName = "";
      updateMapTransform();
      renderMapLayer();
    };

    mapViewport.addEventListener("wheel", event => {
      event.preventDefault();

      if (event.deltaY < 0) {
        zoomMap(0.15);
      } else {
        zoomMap(-0.15);
      }
    });

    mapViewport.addEventListener("mousedown", event => {
      isDragging = true;
      startX = event.clientX - translateX;
      startY = event.clientY - translateY;
      mapViewport.classList.add("is-dragging");
      mapViewport.style.cursor = "grabbing";
    });

    window.addEventListener("mousemove", event => {
      if (!isDragging) return;

      translateX = event.clientX - startX;
      translateY = event.clientY - startY;
      updateMapTransform();
    });

    window.addEventListener("mouseup", () => {
      if (!isDragging) return;

      isDragging = false;
      mapViewport.classList.remove("is-dragging");
      mapViewport.style.cursor = "grab";
    });

    mapViewport.addEventListener("touchstart", event => {
      if (event.touches.length !== 1) return;

      isDragging = true;
      startX = event.touches[0].clientX - translateX;
      startY = event.touches[0].clientY - translateY;
      mapViewport.classList.add("is-dragging");
    }, { passive: false });

    mapViewport.addEventListener("touchmove", event => {
      if (!isDragging || event.touches.length !== 1) return;

      event.preventDefault();

      translateX = event.touches[0].clientX - startX;
      translateY = event.touches[0].clientY - startY;
      updateMapTransform();
    }, { passive: false });

    mapViewport.addEventListener("touchend", () => {
      if (!isDragging) return;

      isDragging = false;
      mapViewport.classList.remove("is-dragging");
    });

    renderMapLayer();
  </script>
</body>
</html>
